<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Business TV Jobs</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:rgba(0,0,0,0.6);
flex-wrap:wrap;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
}

.site-title{
font-size:18px;
font-weight:bold;
}

.header-center{
display:flex;
gap:15px;
font-size:22px;
}

.header-center a{
color:white;
}

.header-right{
display:flex;
gap:10px;
}

.btn-offre{
background:#ff9800;
border:none;
padding:8px 14px;
border-radius:20px;
color:white;
cursor:pointer;
}

.btn-premium{
background:#e91e63;
border:none;
padding:8px 14px;
border-radius:20px;
color:white;
cursor:pointer;
}

/* SEARCH */

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

/* PREMIUM BUTTONS */

.premium-actions{
display:flex;
gap:10px;
justify-content:center;
padding:10px;
flex-wrap:wrap;
}

.btn-voir-premium{
background:#ff9800;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
}

.btn-creer-premium{
background:#e91e63;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* CATEGORIES */

.categories{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.categories button{
background:#2196f3;
border:none;
color:white;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

/* OFFRES */

.section{
padding:15px;
}

.offre{
background:white;
color:black;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.offre button{
background:#25d366;
border:none;
padding:8px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* PREMIUM */

#premium{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.profil{
min-width:180px;
background:white;
color:black;
padding:10px;
border-radius:10px;
text-align:center;
}

.profil img{
width:70px;
height:70px;
border-radius:50%;
margin-bottom:5px;
}

.profil button{
background:#25d366;
border:none;
padding:6px;
border-radius:6px;
color:white;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#00000066;
margin-top:20px;
}

</style>

</head>

<body>

<header class="header">

<div class="header-left">

<img class="logo"
src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260304_122805013.png">

<span class="site-title">Business TV Jobs</span>

</div>

<div class="header-center">

<a href="https://business-tv.vercel.app/" target="_blank">
<i class="fa-solid fa-globe"></i>
</a>

<a href="https://www.facebook.com/profile.php?id=61587742360056" target="_blank">
<i class="fa-brands fa-facebook"></i>
</a>

<a href="https://whatsapp.com/channel/0029Vb8CxB25Ui2VYo0Ylt2w" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
</a>

</div>

<div class="header-right">

<a href="https://forms.gle/SgeUAdndex6Ch9Fh8" target="_blank">
<button class="btn-offre">➕ Publier</button>
</a>

<a href="https://forms.gle/qNs3xAPf2UUU7NhC9" target="_blank">
<button class="btn-premium">⭐ Premium</button>
</a>

</div>

</header>

<div class="search">

<input type="text" id="search"
placeholder="Rechercher ville, quartier, profession..."
onkeyup="rechercher()">

</div>

<div class="premium-actions">

<button onclick="voirPremium()" class="btn-voir-premium">
⭐ Voir les profils Premium
</button>

<a href="https://forms.gle/qNs3xAPf2UUU7NhC9" target="_blank">
<button class="btn-creer-premium">
👤 Créer profil Premium
</button>
</a>

</div>

<div class="categories" id="categories"></div>

<div class="section">

<h3>💼 Offres d'emploi</h3>

<div id="offres"></div>

</div>

<div class="section">

<h3>⭐ Profils Premium</h3>

<div id="premium"></div>

</div>

<footer>

© Business TV Cameroun

</footer>

<script>

let offresData=[]
let premiumData=[]

fetch("https://sheetdb.io/api/v1/xfp4ufhy8zirg")
.then(res=>res.json())
.then(data=>{
offresData=data
afficherOffres(data)
genererCategories()
})

function afficherOffres(data){

let container=document.getElementById("offres")

container.innerHTML=""

data.forEach((o,i)=>{

container.innerHTML+=`

<div class="offre">

<h4>${o["nom entreprise ou employeur "]}</h4>

<p>${o["type d'employer recherché "]}</p>

<p>${o["ville quartier où localisation "]}</p>

<p>${o["description "]}</p>

<button onclick="contactOffre('${o["contact WhatsApp "]}')">

<i class="fab fa-whatsapp"></i> Contacter

</button>

</div>

`

})

}

function genererCategories(){

let cats=new Set()

offresData.forEach(o=>{

cats.add(o["catégories "])

})

let container=document.getElementById("categories")

cats.forEach(c=>{

container.innerHTML+=

`<button onclick="filtrer('${c}')">${c}</button>`

})

}

function filtrer(cat){

let offres=offresData.filter(o=>

o["catégories "].toLowerCase().includes(cat.toLowerCase())

)

afficherOffres(offres)

}

function rechercher(){

let mot=document.getElementById("search").value.toLowerCase()

let offres=offresData.filter(o=>

JSON.stringify(o).toLowerCase().includes(mot)

)

afficherOffres(offres)

}

function contactOffre(numero){

window.open("https://wa.me/237"+numero)

}

fetch("https://sheetdb.io/api/v1/14gkkcq7cvn8v")
.then(res=>res.json())
.then(data=>{
premiumData=data
afficherPremium(data)
})

function afficherPremium(data){

let container=document.getElementById("premium")

container.innerHTML=""

data.forEach(p=>{

container.innerHTML+=`

<div class="profil">

<img src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260304_122805013.png">

<h4>${p["nom et prénom :"]}</h4>

<p>${p["ville et quartier :"]}</p>

<button onclick="contactProfil()">

<i class="fab fa-whatsapp"></i> Contacter

</button>

</div>

`

})

}

function contactProfil(){

window.open("https://wa.me/237670035609")

}

function voirPremium(){

document.getElementById("premium")
.scrollIntoView({behavior:"smooth"})

}

</script>

</body>

</html>
