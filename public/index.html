<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Travailleurs - Gestion</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#0b0f1a; color:#fff; padding:1rem; }
h2{margin-top:0;}
input,textarea,select,button{margin:0.3rem 0; padding:0.5rem; border-radius:8px; border:none;}
button{cursor:pointer;}
.btn-whatsapp{background:#25D366;color:#fff;font-weight:bold;}
.btn-block{background:#f87171;color:#fff;}
.btn-unblock{background:#34d399;color:#000;}
small{font-size:10px;color:#ccc;}
.profile img{width:50px;height:50px;border-radius:50%;object-fit:cover;margin-right:0.5rem;}
table{width:100%;border-collapse:collapse;margin-top:1rem;}
th,td{padding:0.4rem;border:1px solid #444;text-align:center;font-size:12px;}
th{background:#4f46e5;}
</style>
</head>
<body>

<h2>Créer votre compte</h2>
<input type="text" id="email" placeholder="Email">
<input type="text" id="status" placeholder="Statut (Chômeur, Entrepreneur…)">
<input type="text" id="profession" placeholder="Profession">
<input type="text" id="phone1" placeholder="Téléphone 1">
<input type="text" id="phone2" placeholder="Téléphone 2">
<input type="text" id="city" placeholder="Ville">
<input type="text" id="quarter" placeholder="Quartier">
<input type="number" id="age" placeholder="Âge">
<input type="file" id="photoFile" accept="image/*">
<img id="previewPhoto" src="" alt="Aperçu" style="width:50px;height:50px;border-radius:50%;display:block;">
<button onclick="createAccount()">Créer un compte</button>
<button class="btn-whatsapp" onclick="contactAdmin()">Contacter l'administrateur</button>

<hr>

<h2>Profil Utilisateur</h2>
<div class="profile">
<img id="profilePhoto" src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Screenshot_20260302-170127.jpg" alt="Profil">
<div id="profileInfo"></div>
<label>Ajouter médias :</label>
<input type="file" id="mediaFile" multiple>
<div id="mediaList"></div>
</div>

<hr>

<h2>Chat Public</h2>
<div id="chatContainer">
<textarea id="messageInput" placeholder="Écrire un message..." rows="2" style="width:100%;"></textarea>
<button onclick="sendMessage()">Envoyer</button>
<div id="chatBox" style="border:1px solid #444; padding:0.5rem; height:150px; overflow-y:auto;"></div>
</div>

<hr>

<h2>Tableau Administrateur</h2>
<table>
<thead>
<tr>
<th>Email</th><th>Statut</th><th>Profession</th><th>Ville</th><th>Bloqué</th><th>Actions</th>
</tr>
</thead>
<tbody id="adminTableBody"></tbody>
</table>

<script>
// --- Stockage ---
let users = JSON.parse(localStorage.getItem('users')||'[]');
let messages = JSON.parse(localStorage.getItem('messages')||'[]');
let currentUser = null;
let blockedUsers = []; // IDs bloqués
let allowedToChat = []; // IDs autorisés à envoyer message

// Prévisualisation photo
document.getElementById('photoFile').addEventListener('change', function(){
  const file=this.files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=function(e){document.getElementById('previewPhoto').src=e.target.result;}
    reader.readAsDataURL(file);
  }
});

// Créer compte
function createAccount(){
  const email=document.getElementById('email').value.trim();
  if(!email){ alert("Email requis"); return; }
  if(users.find(u=>u.email===email)){ alert("Email déjà utilisé"); return; }
  const newUser = {
    id:'u_'+Date.now(),
    email,
    status:document.getElementById('status').value,
    profession:document.getElementById('profession').value,
    phone1:document.getElementById('phone1').value,
    phone2:document.getElementById('phone2').value,
    city:document.getElementById('city').value,
    quarter:document.getElementById('quarter').value,
    age:document.getElementById('age').value,
    photo:document.getElementById('previewPhoto').src,
    media:[],
    blocked:false
  };
  users.push(newUser);
  localStorage.setItem('users', JSON.stringify(users));
  currentUser=newUser;
  displayProfile();
  renderAdminTable();
  alert("Compte créé ! Votre ID : "+newUser.id);
}

// Contact admin
function contactAdmin(){
  if(!currentUser){ alert("Créez d'abord votre compte"); return; }
  const message=encodeURIComponent("Demande validation compte ID: "+currentUser.id);
  window.open(`https://wa.me/237670035609?text=${message}`,"_blank");
}

// Affichage profil
function displayProfile(){
  if(!currentUser) return;
  document.getElementById('profilePhoto').src=currentUser.photo;
  const info=`<small>Email: ${currentUser.email}</small><br>
  <small>Statut: ${currentUser.status}</small><br>
  <small>Profession: ${currentUser.profession}</small><br>
  <small>Tel1: ${currentUser.phone1}</small><br>
  <small>Tel2: ${currentUser.phone2}</small><br>
  <small>Ville: ${currentUser.city}</small><br>
  <small>Quartier: ${currentUser.quarter}</small><br>
  <small>Âge: ${currentUser.age}</small>`;
  document.getElementById('profileInfo').innerHTML=info;
}

// Ajout médias
document.getElementById('mediaFile').addEventListener('change', function(){
  if(!currentUser) return;
  const files=Array.from(this.files);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){ 
      currentUser.media.push(e.target.result);
      renderMedia();
      localStorage.setItem('users', JSON.stringify(users));
    }
    reader.readAsDataURL(file);
  });
});

function renderMedia(){
  const container=document.getElementById('mediaList');
  container.innerHTML='';
  currentUser.media.forEach((m,i)=>{
    const ext=m.split(';')[0].split('/')[1];
    let el;
    if(ext==='jpeg'||ext==='png'||ext==='jpg') el=`<img src="${m}" style="width:50px;height:50px;margin:2px;">`;
    else if(ext==='mp4') el=`<video src="${m}" controls style="width:80px;height:50px;margin:2px;"></video>`;
    else if(ext==='mp3') el=`<audio src="${m}" controls style="width:80px;margin:2px;"></audio>`;
    else el=`<a href="${m}" target="_blank">Fichier ${i+1}</a>`;
    container.innerHTML+=el;
  });
}

// --- Chat ---
function renderChat(){
  const chatBox=document.getElementById('chatBox');
  chatBox.innerHTML='';
  messages.forEach(msg=>{
    const blocked=blockedUsers.includes(msg.userId);
    chatBox.innerHTML+=`<div><b>${msg.email}:</b> ${msg.text} ${blocked?'<small>(Bloqué)</small>':''}</div>`;
  });
}

function sendMessage(){
  if(!currentUser){ alert("Créez un compte d'abord"); return; }
  if(blockedUsers.includes(currentUser.id)){ alert("Vous êtes bloqué pour envoyer des messages"); return; }
  const text=document.getElementById('messageInput').value.trim();
  if(!text) return;
  messages.push({userId:currentUser.id,email:currentUser.email,text});
  localStorage.setItem('messages', JSON.stringify(messages));
  document.getElementById('messageInput').value='';
  renderChat();
}

// --- Tableau Admin ---
function renderAdminTable(){
  const tbody=document.getElementById('adminTableBody');
  tbody.innerHTML='';
  users.forEach(u=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${u.email}</td>
      <td>${u.status}</td>
      <td>${u.profession}</td>
      <td>${u.city}</td>
      <td>${u.blocked?'Oui':'Non'}</td>
      <td>
        <button class="${u.blocked?'btn-unblock':'btn-block'}" onclick="toggleBlock('${u.id}')">
        ${u.blocked?'Débloquer':'Bloquer'}</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function toggleBlock(id){
  users=users.map(u=>u.id===id?{...u,blocked:!u.blocked}:u);
  localStorage.setItem('users', JSON.stringify(users));
  blockedUsers=users.filter(u=>u.blocked).map(u=>u.id);
  renderAdminTable();
  renderChat();
}

// --- Initialisation ---
renderAdminTable();
renderChat();
</script>

</body>
</html>
