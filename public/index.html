#tickerText{

@keyframes tickerMove{

function showOffers(cat){

const list=document.getElementById("offersList");
list.innerHTML="";

if(!offers[cat]) return;

offers[cat].forEach(offer=>{

const div=document.createElement("div");

div.className="offer-card";
div.id="job"+offer.id;

div.innerHTML=`

<h3>${offer.title}</h3>
<p>${offer.desc}</p>
<p>${offer.location}</p>

<div class="offer-actions">

<button class="primary" onclick="applyOffer('${offer.title}','${offer.whatsapp}')">
Postuler
</button>

<button class="success" onclick="copyLink(${offer.id})">
Lien
</button>

<button class="success" onclick="contactOffer('${offer.whatsapp}','${offer.title}',${offer.id})">
WhatsApp
</button>

</div>

`;

list.appendChild(div);

});

function showPremium(){

const list=document.getElementById("offersList");
list.innerHTML="";

Object.keys(premiumUsers).forEach(city=>{

const cityDiv=document.createElement("div");
cityDiv.className="premium-city";
cityDiv.innerHTML=`<h2>${city}</h2>`;

const scroll=document.createElement("div");
scroll.className="premium-scroll";

premiumUsers[city].forEach(user=>{

const card=document.createElement("div");
card.className="premium-card";

card.innerHTML=`

<h4>${user.name}</h4>
<p>Age: ${user.age}</p>
<p>${user.district}</p>
<p>${user.position}</p>

<button onclick="window.open('https://wa.me/${user.phone}')">
WhatsApp
</button>

`;

scroll.appendChild(card);

});

cityDiv.appendChild(scroll);
list.appendChild(cityDiv);

});

}

function searchOffers(){

const term=document.getElementById("searchOffer").value.toLowerCase();
const list=document.getElementById("offersList");
list.innerHTML="";

Object.values(offers).forEach(arr=>{

arr.forEach(o=>{

const text=(o.title+o.desc+o.location).toLowerCase();

if(text.includes(term)){

const div=document.createElement("div");
div.className="offer-card";

div.innerHTML="<h3>"+o.title+"</h3><p>"+o.desc+"</p><p>"+o.location+"</p>";

list.appendChild(div);

}

});

});

}
