<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshopkmer</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:#111827;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* SECTIONS */
section{
  padding:15px;
}

/* INPUTS */
input, button{
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

/* USERS TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:8px;
  border-bottom:1px solid #333;
}

/* PROFILE */
#profilePage{
  display:none;
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

#mediaList{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 0;
}

#mediaList img,
#mediaList video{
  height:220px;
  border-radius:12px;
  object-fit:cover;
}

#mediaList audio{
  width:250px;
}

#mediaList a{
  background:#334155;
  padding:20px;
  border-radius:12px;
  min-width:200px;
  display:inline-block;
  color:white;
  text-decoration:none;
}

/* CHAT */
#chatBox{
  height:300px;
  overflow-y:auto;
  background:#111827;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.message{
  margin-bottom:10px;
}

.message b{
  color:#60a5fa;
}
</style>
</head>

<body>

<header>WORKSHOPKMER</header>

<section>

<h3>Créer un compte</h3>

<input type="text" id="companyName" placeholder="Nom entreprise"><br>
<input type="text" id="city" placeholder="Ville"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="file" id="photoFile" accept="image/*"><br>
<button onclick="createAccount()">Créer un compte</button>

<hr>

<h3>Utilisateurs</h3>
<table>
<tbody id="usersTableBody"></tbody>
</table>

<div id="profilePage">
  <h3>Profil</h3>
  <img id="profilePhoto" width="120" style="border-radius:50%"><br>
  <div id="profileInfo"></div>
  <br>
  <input type="file" id="mediaFile" multiple>
  <div id="mediaList"></div>
</div>

<hr>

<h3>Discussion</h3>

<div id="chatBox"></div>

<input type="text" id="messageInput" placeholder="Votre message">
<input type="file" id="chatMedia" multiple>
<button onclick="sendMessage()">Envoyer</button>

</section>

<script>

// ======================
// STOCKAGE
// ======================
let users = JSON.parse(localStorage.getItem('users') || '[]');
let messages = JSON.parse(localStorage.getItem('messages') || '[]');
let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');

// ======================
// CREATION COMPTE
// ======================
function createAccount(){

  const email = document.getElementById('email').value.trim();
  if(!email) return alert("Email requis");

  if(users.find(u => u.email === email)){
    return alert("Email déjà utilisé");
  }

  const reader = new FileReader();
  const file = document.getElementById('photoFile').files[0];

  reader.onload = function(e){

    const newUser = {
      id:"u_" + Date.now(),
      companyName:document.getElementById('companyName').value,
      city:document.getElementById('city').value,
      email,
      photo:e.target.result || defaultPhoto(),
      media:[],
      blocked:false
    };

    users.push(newUser);
    localStorage.setItem('users', JSON.stringify(users));

    currentUser = newUser;
    localStorage.setItem('currentUser', JSON.stringify(currentUser));

    alert("Compte créé ✅\nID : " + newUser.id);
    renderUsers();
  };

  if(file){
    reader.readAsDataURL(file);
  } else {
    reader.onload({target:{result:defaultPhoto()}});
  }
}

function defaultPhoto(){
  return "https://via.placeholder.com/150";
}

// ======================
// USERS LIST
// ======================
function renderUsers(){

  const tbody = document.getElementById('usersTableBody');
  tbody.innerHTML="";

  users.forEach(u=>{
    tbody.innerHTML += `
      <tr>
        <td><img src="${u.photo}" width="40" style="border-radius:50%"></td>
        <td>${u.companyName}</td>
        <td>${u.city}</td>
        <td><button onclick="openProfile('${u.id}')">Voir Profil</button></td>
      </tr>
    `;
  });
}

// ======================
// PROFILE
// ======================
function openProfile(id){

  const user = users.find(u=>u.id===id);
  if(!user) return;

  document.getElementById('profilePage').style.display='block';
  document.getElementById('profilePhoto').src = user.photo;

  document.getElementById('profileInfo').innerHTML = `
    <b>${user.companyName}</b><br>
    Ville: ${user.city}<br>
    ID: ${user.id}
  `;

  renderMedia(user);
}

function renderMedia(user){

  const container = document.getElementById('mediaList');
  container.innerHTML="";

  if(!user.media) return;

  user.media.forEach(m=>{

    if(m.startsWith("data:image")){
      container.innerHTML += `<img src="${m}">`;
    }
    else if(m.startsWith("data:video")){
      container.innerHTML += `<video src="${m}" controls></video>`;
    }
    else if(m.startsWith("data:audio")){
      container.innerHTML += `<audio src="${m}" controls></audio>`;
    }
  });
}

// ======================
// AJOUT MEDIA PROFIL
// ======================
document.getElementById('mediaFile').addEventListener('change', function(){

  if(!currentUser) return alert("Créez un compte d'abord");

  const files = Array.from(this.files);

  files.forEach(file=>{
    const reader = new FileReader();

    reader.onload = function(e){

      const index = users.findIndex(u=>u.id===currentUser.id);
      if(index===-1) return;

      users[index].media.push(e.target.result);
      localStorage.setItem('users', JSON.stringify(users));

      renderMedia(users[index]);
    };

    reader.readAsDataURL(file);
  });

});

// ======================
// CHAT
// ======================
function sendMessage(){

  if(!currentUser) return alert("Créez un compte d'abord");

  const text = document.getElementById('messageInput').value.trim();
  if(!text) return;

  messages.push({
    userId:currentUser.id,
    name:currentUser.companyName,
    text
  });

  localStorage.setItem('messages', JSON.stringify(messages));
  document.getElementById('messageInput').value="";
  renderChat();
}

function renderChat(){

  const box = document.getElementById('chatBox');
  box.innerHTML="";

  messages.forEach(m=>{

    let content = "";

    if(m.text){
      content = m.text;
    }

    if(m.media){
      if(m.media.startsWith("data:image")){
        content = `<img src="${m.media}" width="200">`;
      }
      else if(m.media.startsWith("data:video")){
        content = `<video src="${m.media}" width="250" controls></video>`;
      }
    }

    box.innerHTML += `
      <div class="message">
        <b>${m.name}:</b><br>
        ${content}
      </div>
    `;
  });

  box.scrollTop = box.scrollHeight;
}

// ======================
// MEDIA CHAT
// ======================
document.getElementById('chatMedia').addEventListener('change', function(){

  if(!currentUser) return alert("Créez un compte d'abord");

  const files = Array.from(this.files);

  files.forEach(file=>{
    const reader = new FileReader();

    reader.onload = function(e){

      messages.push({
        userId:currentUser.id,
        name:currentUser.companyName,
        media:e.target.result
      });

      localStorage.setItem('messages', JSON.stringify(messages));
      renderChat();
    };

    reader.readAsDataURL(file);
  });

});

// ======================
renderUsers();
renderChat();

</script>

</body>
</html>
