<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Travailleurs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary: #4f46e5;
      --background: #0b0f1a;
      --text: #ffffff;
      --accent: #6366f1;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--background);
      color: var(--text);
    }

    header {
      background-color: var(--primary);
      padding: 1rem;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
    }

    main {
      padding: 1rem;
      max-width: 900px;
      margin: auto;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #1f2937;
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .btn {
      padding: 0.5rem 1rem;
      margin: 0.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-premium {
      background-color: var(--accent);
      color: white;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .btn-private {
      background-color: gray;
      color: white;
    }

    input, select {
      padding: 0.5rem;
      margin: 0.5rem 0;
      border-radius: 8px;
      border: none;
      width: 100%;
    }

    label {
      margin-top: 0.5rem;
    }

    footer {
      text-align: center;
      padding: 1rem;
      margin-top: 2rem;
      color: gray;
    }

  </style>
</head>
<body>

<header>SaaS Travailleurs</header>

<main>

  <div class="profile">
    <img src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Screenshot_20260302-170127.jpg" alt="Profil animé">
    <h2 id="username">Nom de l'utilisateur</h2>
    <p id="user-status">Statut : Chômeur</p>
    <p id="user-profession">Profession : Développeur</p>
    <p id="user-city">Ville : Yaoundé</p>

    <button class="btn btn-private" onclick="togglePrivate()">Privé/Public</button>
    <button class="btn btn-premium" onclick="upgradePremium()">Passer Premium</button>
  </div>

</main>

<footer>&copy; 2026 SaaS Travailleurs</footer>

<script>
  function togglePrivate() {
    alert('Statut du profil changé (simulation)');
  }

  function upgradePremium() {
    if (confirm("Payer 500 F pour passer en version premium et rendre votre profil public ?")) {
      window.location.href = "https://wa.me/237670035609?text=Demande%20Premium";
    }
  }
</script>

</body>
</html>public
