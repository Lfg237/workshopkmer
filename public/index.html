<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#0f172a;color:#fff;}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

header button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

header button:hover{opacity:0.8;}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{opacity:0.8;}

.primary{background:#2563eb;color:#fff;}
.success{background:#16a34a;color:#fff;}
.danger{background:#dc2626;color:#fff;}

.category-btn{
background:#334155;
color:#fff;
margin:5px;
}

.offer-card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin:10px 0;
}

.offer-card h3{margin:0 0 5px 0;}

.offer-actions{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.offer-actions button{flex:1;}

.search-box{
margin:15px 0;
}

.search-box input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
background:#334155;
color:white;
}

/* popup */

#formPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

#formPopupContent{
background:#1e293b;
padding:20px;
border-radius:12px;
width:95%;
max-width:500px;
text-align:center;
overflow-y:auto;
max-height:75vh;
}

#formPopupContent input,
#formPopupContent textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
background:#334155;
color:#fff;
}

/* premium table */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #fff;
padding:8px;
text-align:left;
}

th{background:#334155;}

#tickerContainer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#2563eb;
color:white;
overflow:hidden;
height:40px;
display:flex;
align-items:center;
font-weight:bold;
}

#tickerText{
white-space:nowrap;
display:inline-block;
padding-left:100%;
animation:tickerMove 20s linear infinite;
}

@keyframes tickerMove{
0%{transform:translateX(0%)}
100%{transform:translateX(-100%)}
}
</style>
</head>

<body>

<header>
🛠️ workshopkmer🪄
<button class="primary" onclick="goHome()"><i class="fas fa-home"></i> Accueil</button>
<button class="success" onclick="showPremium()"><i class="fas fa-star"></i> Premium</button>
<button class="success" onclick="openWhatsAppChannel()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
</header>

<div class="container">

<h2>Catégories de postes</h2>

<div class="search-box">
<input type="text" id="searchOffer" placeholder="🔎 Rechercher une offre..." onkeyup="searchOffers()">

<h2 id="offersTitle">Offres</h2>
<div id="offersList"></div>

<!-- FORMULAIRE -->

<div id="formPopup">
<div id="formPopupContent">

<input type="text" id="applicantName" placeholder="Nom complet">
<input type="email" id="applicantEmail" placeholder="Email">
<input type="number" id="applicantAge" placeholder="Âge">
<input type="text" id="applicantCity" placeholder="Ville">
<input type="text" id="applicantDistrict" placeholder="Quartier">
<input type="text" id="applicantPosition" placeholder="Poste sollicité">
<input type="text" id="applicantDegree" placeholder="Diplôme">

<textarea id="applicantMessage" placeholder="Votre message"></textarea>

<input type="date" id="applicantDate">

<div style="margin-top:10px">

<button class="success" id="submitWhatsApp">
<i class="fab fa-whatsapp"></i> Envoyer via WhatsApp
</button>

<button class="primary" id="submitEmail">
<i class="fas fa-envelope"></i> Email
</button>

<button class="danger" onclick="closeForm()">Annuler</button>

</div>
</div>
</div>

<div id="tickerContainer">
<div id="tickerText">
🔥 Découvrez nos nouvelles offres d'emploi chaque jour ! 🔥
</div>
</div>

const catDiv=document.getElementById("categories");

categories.forEach(cat=>{

let selectedOffer=null;

/* afficher offres */

function showOffers(cat){

const list=document.getElementById("offersList");

list.innerHTML="";

offers[cat]?.forEach(offer=>{

const div=document.createElement("div");

div.className="offer-card";

div.innerHTML=`

<h3>${offer.title}</h3>
<p>${offer.desc}</p>
<p><b>Localisation:</b> ${offer.location}</p>

<div class="offer-actions">

<button class="primary" onclick="openForm(${offer.id})">
Postuler
</button>

<button class="success" onclick="copyLink(${offer.id})">
Lien
</button>

<button class="success"
onclick="openWhatsApp('${offer.whatsapp}','${offer.title}',${offer.id})">
WhatsApp
</button>

</div>
`;

list.appendChild(div);

});

}

/* recherche */

function searchOffers(){

const term=document.getElementById("searchOffer").value.toLowerCase();

document.querySelectorAll(".offer-card").forEach(card=>{

card.style.display=card.innerText.toLowerCase().includes(term)
? "block":"none";

});

}

/* ouvrir formulaire */

function openForm(id){

selectedOffer=Object.values(offers).flat().find(o=>o.id===id);

document.getElementById("formPopup").style.display="flex";

}

function closeForm(){
document.getElementById("formPopup").style.display="none";
}

/* récupérer données */

function gatherFormData(){

return{

email:document.getElementById("applicantEmail").value,
age:document.getElementById("applicantAge").value,
city:document.getElementById("applicantCity").value,
district:document.getElementById("applicantDistrict").value,
position:document.getElementById("applicantPosition").value,
degree:document.getElementById("applicantDegree").value,
message:document.getElementById("applicantMessage").value,
date:document.getElementById("applicantDate").value

};

}

/* WhatsApp candidature */

document.getElementById("submitWhatsApp").onclick=function(){

const data=gatherFormData();

let filled=0;

Object.values(data).forEach(v=>{
if(v && v.length>0)filled++;
});

if(filled<2){
alert("Remplir au moins 2 informations");
return;
}

const link=`https://workshopkmer.vercel.app/#job${selectedOffer.id}`;

const text=encodeURIComponent(

`Candidature pour ${selectedOffer.title}

Ville: ${data.city}
Quartier: ${data.district}
Poste: ${data.position}
Diplôme: ${data.degree}
Message: ${data.message}
Date: ${data.date}`

);

window.open(`https://wa.me/${selectedOffer.whatsapp}?text=${text}`);

};

/* whatsapp simple */

function openWhatsApp(number,title,id){

const link=`https://workshopkmer.vercel.app/#job${id}`;

const text=encodeURIComponent(
`Bonjour je souhaite postuler pour ${title}

Lien:
${link}`
);

window.open(`https://wa.me/${number}?text=${text}`);

}

/* copier lien */

function copyLink(id){

const url=`https://workshopkmer.vercel.app/#job${id}`;

navigator.clipboard.writeText(url);

alert("Lien copié");

}
