<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Business TV Jobs</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:rgba(0,0,0,0.6);
flex-wrap:wrap;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
}

.site-title{
font-size:18px;
font-weight:bold;
}

.header-center{
display:flex;
gap:15px;
font-size:22px;
}

.header-center a{
color:white;
}

.header-right{
display:flex;
gap:10px;
}

.btn-offre{
background:#ff9800;
border:none;
padding:8px 14px;
border-radius:20px;
color:white;
cursor:pointer;
}

.btn-premium{
background:#e91e63;
border:none;
padding:8px 14px;
border-radius:20px;
color:white;
cursor:pointer;
}

/* SEARCH */

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

/* ACTIONS */

.actions{
display:flex;
justify-content:center;
padding:10px;
}

.btn-creer-premium{
background:#e91e63;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* CATEGORIES */

.categories{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.categories button{
background:#2196f3;
border:none;
color:white;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

/* OFFRES */

.section{
padding:15px;
}

.offre{
background:white;
color:black;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.offre button{
background:#25d366;
border:none;
padding:8px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* PREMIUM */

#premium{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.profil{
min-width:180px;
background:white;
color:black;
padding:10px;
border-radius:10px;
text-align:center;
position:relative;
}

.profil img{
width:70px;
height:70px;
border-radius:50%;
margin-bottom:5px;
}

.profil button{
background:#25d366;
border:none;
padding:6px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* BADGES */

.badge{
position:absolute;
top:5px;
right:5px;
font-size:11px;
padding:3px 8px;
border-radius:10px;
color:white;
}

.attente{background:#f1c40f;color:black;}
.verifie{background:#2ecc71;}
.premium{background:#9b59b6;}

/* POPUP */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
}

.popup-content{
background:white;
width:90%;
height:90%;
border-radius:10px;
overflow:hidden;
position:relative;
}

.popup iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:30px;
cursor:pointer;
color:black;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#00000066;
margin-top:20px;
}

</style>

</head>

<body>

<header class="header">

<div class="header-left">

<img class="logo"
src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260304_122805013.png">

<span class="site-title">Business TV Jobs</span>

</div>

<div class="header-center">

<a href="https://business-tv.vercel.app/" target="_blank">
<i class="fa-solid fa-globe"></i>
</a>

<a href="https://www.facebook.com/profile.php?id=61587742360056" target="_blank">
<i class="fa-brands fa-facebook"></i>
</a>

<a href="https://whatsapp.com/channel/0029Vb8CxB25Ui2VYo0Ylt2w" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
</a>

</div>

<div class="header-right">

<button class="btn-offre" onclick="ouvrirFormOffre()">➕ Publier</button>

<button onclick="voirPremium()" class="btn-premium">
⭐ Premium
</button>

</div>

</header>

<div class="search">

<input type="text" id="search"
placeholder="Rechercher ville, quartier, profession..."
onkeyup="rechercher()">

</div>

<div class="actions">

<button class="btn-creer-premium" onclick="ouvrirFormPremium()">
👤 Créer profil Premium
</button>

</div>

<div class="categories" id="categories"></div>

<div class="section">

<h3>💼 Offres d'emploi</h3>

<div id="offres"></div>

</div>

<div class="section">

<h3>⭐ Profils Premium</h3>

<div id="premium"></div>

</div>

<footer>

© Business TV Cameroun

</footer>

<!-- POPUP OFFRE -->

<div id="popupOffre" class="popup">
<div class="popup-content">

<span class="close" onclick="fermerPopup('popupOffre')">×</span>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeOffre/viewform?embedded=true"></iframe>

</div>
</div>

<!-- POPUP PREMIUM -->

<div id="popupPremium" class="popup">
<div class="popup-content">

<span class="close" onclick="fermerPopup('popupPremium')">×</span>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSePremium/viewform?embedded=true"></iframe>

</div>
</div>

<script>

let offresData=[]
let premiumData=[]

fetch("https://sheetdb.io/api/v1/xfp4ufhy8zirg")
.then(res=>res.json())
.then(data=>{
offresData=data
afficherOffres(data)
genererCategories()
})

function afficherOffres(data){

let container=document.getElementById("offres")

container.innerHTML=""

data.forEach((o)=>{

container.innerHTML+=`

<div class="offre">

<h4>${o["nom entreprise ou employeur "]}</h4>

<p>${o["type d'employer recherché "]}</p>

<p>${o["ville quartier où localisation "]}</p>

<p>${o["description "]}</p>

<button onclick="contactOffre('${o["contact WhatsApp "]}')">

<i class="fab fa-whatsapp"></i> Contacter

</button>

</div>

`

})

}

function contactOffre(numero){

let message="Bonjour, je vous contacte pour votre annonce sur Business TV Jobs : https://business-tv.vercel.app/"

window.open("https://wa.me/237"+numero+"?text="+encodeURIComponent(message))

}

function genererCategories(){

let cats=new Set()

offresData.forEach(o=>{
cats.add(o["catégories "])
})

let container=document.getElementById("categories")
container.innerHTML=""

cats.forEach(c=>{
container.innerHTML+=`<button onclick="filtrer('${c}')">${c}</button>`
})

}

function filtrer(cat){

let offres=offresData.filter(o=>
o["catégories "].toLowerCase().includes(cat.toLowerCase())
)

afficherOffres(offres)

}

function rechercher(){

let mot=document.getElementById("search").value.toLowerCase()

let offres=offresData.filter(o=>
JSON.stringify(o).toLowerCase().includes(mot)
)

afficherOffres(offres)

}

/* PREMIUM */

fetch("https://sheetdb.io/api/v1/14gkkcq7cvn8v")
.then(res=>res.json())
.then(data=>{
premiumData=data
afficherPremium(data)
})

function afficherPremium(data){

let container=document.getElementById("premium")
container.innerHTML=""

data.forEach(p=>{

let statut=(p["statut"]||"attente").toLowerCase()
if(statut=="refuse"){return}

let badgeClass="attente"
let badgeText="⏳"

if(statut=="verifie"){badgeClass="verifie";badgeText="✔"}
if(statut=="premium"){badgeClass="premium";badgeText="⭐"}

container.innerHTML+=`

<div class="profil">

<span class="badge ${badgeClass}">${badgeText}</span>

<img src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260304_122805013.png">

<h4>${p["nom et prénom :"]}</h4>

<p>${p["âge :"]||""}</p>

<p>${p["ville et quartier :"]}</p>

<button onclick="contactProfil('${p["WhatsApp :"]||"670035609"}')">

<i class="fab fa-whatsapp"></i> Contacter

</button>

</div>

`

})

}

function contactProfil(numero){

let message="Bonjour, je viens de voir votre profil sur Business TV Jobs : https://business-tv.vercel.app/"

window.open("https://wa.me/237"+numero+"?text="+encodeURIComponent(message))

}

function voirPremium(){
document.getElementById("premium").scrollIntoView({behavior:"smooth"})
}

function ouvrirFormOffre(){
document.getElementById("popupOffre").style.display="flex"
}

function ouvrirFormPremium(){
document.getElementById("popupPremium").style.display="flex"
}

function fermerPopup(id){
document.getElementById(id).style.display="none"
}

</script>

</body>
</html>
