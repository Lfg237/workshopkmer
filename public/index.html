<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>workshopkmer</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:rgba(0,0,0,0.6);
flex-wrap:wrap;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
}

.site-title{
font-size:18px;
font-weight:bold;
}

.header-center{
display:flex;
gap:15px;
font-size:22px;
}

.header-center a{
color:white;
}

.header-right{
display:flex;
gap:10px;
}

.btn-offre{
background:#ff9800;
border:none;
padding:8px 14px;
border-radius:20px;
color:white;
cursor:pointer;
}

.btn-premium{
background:#e91e63;
border:none;
padding:8px 14px;
border-radius:20px;
color:white;
cursor:pointer;
}

/* SEARCH */

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

/* ACTIONS */

.actions{
display:flex;
justify-content:center;
padding:10px;
}

.btn-creer-premium{
background:#e91e63;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* CATEGORIES */

.categories{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.categories button{
background:#2196f3;
border:none;
color:white;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

/* OFFRES */

.section{
padding:15px;
}

.categorie-scroll{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.offre{
flex:0 0 230px;
background:white;
color:black;
padding:12px;
border-radius:10px;
}

.offre h4{
font-weight:bold;
font-size:16px;
}

.offre button{
background:#25d366;
border:none;
padding:8px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* PROFILS */

#premium{
display:block;
}

.ville-scroll{
display:flex;
flex-direction:row;
gap:12px;
overflow-x:auto;
overflow-y:hidden;
padding:10px;
scroll-behavior:smooth;
}

.profil{
flex:0 0 180px;
background:white;
color:black;
padding:10px;
border-radius:10px;
text-align:center;
position:relative;
}

.profil img{
width:70px;
height:70px;
border-radius:50%;
margin-bottom:5px;
}

.profil button{
background:#25d366;
border:none;
padding:6px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* BADGES */

.badge{
position:absolute;
top:5px;
right:5px;
font-size:11px;
padding:3px 8px;
border-radius:10px;
color:white;
}

.attente{background:#f1c40f;color:black;}
.verifie{background:#2ecc71;}
.premium{background:#9b59b6;}

/* WhatsApp flottant */

.whatsapp-float{
position:fixed;
bottom:80px;
right:20px;
background:#25d366;
color:white;
font-size:28px;
padding:15px;
border-radius:50%;
z-index:999;
}

/* BANDE ANNONCE */

.ticker{
position:fixed;
bottom:0;
width:100%;
background:black;
color:white;
padding:8px;
font-size:14px;
}

</style>
</head>

<body>

<header class="header">

<div class="header-left">

<img class="logo"
src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260304_122805013.png">

<span class="site-title">workshopkmer</span>

</div>

<div class="header-center">

<a href="https://business-tv.vercel.app/" target="_blank">
<i class="fa-solid fa-globe"></i>
</a>

<a href="https://www.facebook.com/profile.php?id=61587742360056" target="_blank">
<i class="fa-brands fa-facebook"></i>
</a>

<a href="https://whatsapp.com/channel/0029Vb8CxB25Ui2VYo0Ylt2w" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
</a>

</div>

<div class="header-right">

<button class="btn-offre" onclick="ouvrirFormOffre()">➕ Publier</button>

<button onclick="voirPremium()" class="btn-premium">
⭐ liste des chercheurs d'emploi
</button>

</div>

</header>

<div class="search">

<input type="text" id="search"
placeholder="Rechercher ville, quartier, profession..."
onkeyup="rechercher()">

</div>

<div class="actions">

<button class="btn-creer-premium" onclick="ouvrirFormPremium()">
👤 Créer profil Premium
</button>

</div>

<div class="categories" id="categories"></div>

<div class="section">
<h3>💼 Offres d'emploi</h3>
<div id="offres"></div>
</div>

<div class="section">
<h3>⭐ Profils Premium</h3>
<div id="premium"></div>
</div>

<a class="whatsapp-float"
href="https://wa.me/237670035609?text=Bonjour%20workshopkmer"
target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<div class="ticker">
<marquee>
📢 Publiez vos offres d'emploi gratuitement sur workshopkmer • 
⭐ Créez votre profil premium pour plus de visibilité • 
📲 Rejoignez notre chaîne WhatsApp pour recevoir les dernières offres
</marquee>
</div>

<script>

let offresData=[]
let premiumData=[]

fetch("https://sheetdb.io/api/v1/xfp4ufhy8zirg")
.then(res=>res.json())
.then(data=>{
offresData=data
afficherOffres(data)
genererCategories()
})

function afficherOffres(data){

let container=document.getElementById("offres")
container.innerHTML=""

let categories={}

data.forEach(o=>{

let cat=o["catégories "] || "Autres"

if(!categories[cat]){
categories[cat]=[]
}

categories[cat].push(o)

})

for(let cat in categories){

container.innerHTML+=`
<h3 style="margin-top:15px">${cat}</h3>
<div class="categorie-scroll" id="cat-${cat.replace(/\s/g,'')}"></div>
`

let catContainer=document.getElementById("cat-"+cat.replace(/\s/g,''))

categories[cat].forEach(o=>{

catContainer.innerHTML+=`

<div class="offre">

<h4><b>${o["nom entreprise ou employeur "]}</b></h4>

<p><b>${o["type d'employer recherché "]}</b></p>

<p>${o["ville quartier où localisation "]}</p>

<p>${o["description "]}</p>

<button onclick="contactOffre('${o["contact WhatsApp "]}')">
<i class="fab fa-whatsapp"></i> Contacter
</button>

</div>

`

})

}

}

function contactOffre(numero){

let message="Bonjour, je vous contacte pour votre annonce : https://workshopkmer.vercel.app/#job1"

window.open("https://wa.me/237"+numero+"?text="+encodeURIComponent(message))

}

/* PROFILS */

fetch("https://sheetdb.io/api/v1/14gkkcq7cvn8v")
.then(res=>res.json())
.then(data=>{
premiumData=data
afficherPremium(data)
})

function afficherPremium(data){

let container=document.getElementById("premium")
container.innerHTML=""

let villes={}

data.forEach(p=>{

let statut=(p["statut"]||"attente").toLowerCase()
if(statut=="refuse"){return}

let localisation=p["ville et quartier :"] || "Autres"

let parts=localisation.split("-")

let ville=parts[0] ? parts[0].trim() : "Autres"
let quartier=parts[1] ? parts[1].trim() : "Centre"

if(!villes[ville]){villes[ville]={}}
if(!villes[ville][quartier]){villes[ville][quartier]=[]}

villes[ville][quartier].push(p)

})

for(let ville in villes){

container.innerHTML+=`<h2 style="margin-top:20px">${ville}</h2>`

for(let quartier in villes[ville]){

let id=(ville+quartier).replace(/\s/g,'')

container.innerHTML+=`
<h4 style="margin-top:10px">📍 ${quartier}</h4>
<div class="ville-scroll" id="zone-${id}"></div>
`

let zone=document.getElementById("zone-"+id)

villes[ville][quartier].forEach(p=>{

let statut=(p["statut"]||"attente").toLowerCase()

let badgeClass="attente"
let badgeText="⏳"

if(statut=="verifie"){
badgeClass="verifie"
badgeText="✔"
}

if(statut=="premium"){
badgeClass="premium"
badgeText="⭐"
}

let infos=""

/* afficher toutes les informations du profil */

for(let key in p){

if(
key.toLowerCase().includes("statut")||
key.toLowerCase().includes("whatsapp")||
key.toLowerCase().includes("nom")
){
continue
}

infos+=`<p><b>${key}</b> ${p[key]}</p>`
}

zone.innerHTML+=`

<div class="profil">

<span class="badge ${badgeClass}">${badgeText}</span>

<img src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260304_122805013.png">

<h4><b>${p["nom et prénom :"] || ""}</b></h4>

${infos}

<button onclick="contactProfil('${p["WhatsApp :"]||""}')">
<i class="fab fa-whatsapp"></i> Contacter
</button>

</div>

`


})

}

}

}

function contactProfil(numero){

let message="Bonjour, je viens de voir votre profil : https://workshopkmer.vercel.app/#job1"

window.open("https://wa.me/237"+numero+"?text="+encodeURIComponent(message))

}

function voirPremium(){
document.getElementById("premium").scrollIntoView({behavior:"smooth"})
}

</script>

</body>
</html>
