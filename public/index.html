<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Offres d'emploi Cameroun</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0a66c2;
color:white;
padding:15px;
text-align:center;
}

.section{
padding:15px;
}

.offre{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

button{
padding:8px 12px;
margin:5px;
border:none;
background:#0a66c2;
color:white;
border-radius:5px;
}

.ville{
margin-top:20px;
}

.scroll{
display:flex;
overflow-x:auto;
gap:10px;
}

.profil{
min-width:160px;
background:white;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h2>Offres d'emploi Cameroun</h2>
</header>

<div class="section">

<h3>Catégories</h3>

<button onclick="filtrer('Vente')">Vente</button>
<button onclick="filtrer('Informatique')">Informatique</button>
<button onclick="filtrer('Marketing')">Marketing</button>
<button onclick="filtrer('Tous')">Tous</button>

</div>

<div class="section">

<h3>Offres d'emploi</h3>

<div id="offres"></div>

</div>

<div class="section">

<h3>Profils Premium</h3>

<div id="premium"></div>

</div>

<script>

let toutesOffres=[];

fetch("https://opensheet.elk.sh/1klJHm6_gXU7EHqKBAe9cFL3i0LMu-u8S1ehz2bCD0AA/Form Responses 1")
.then(res=>res.json())
.then(data=>{
toutesOffres=data;
afficherOffres(data);
});

function afficherOffres(data){

let container=document.getElementById("offres");

container.innerHTML="";

data.forEach(o=>{

container.innerHTML+=`
<div class="offre">

<h4>${o.Titre}</h4>

<p>${o.Ville}</p>

<p>${o.Categorie}</p>

<p>${o.Description}</p>

<a href="https://wa.me/${o.WhatsApp}">
<button>Contacter</button>
</a>

</div>
`;

});

}

function filtrer(cat){

if(cat==="Tous"){
afficherOffres(toutesOffres);
return;
}

let result=toutesOffres.filter(o=>o.Categorie===cat);

afficherOffres(result);

}

fetch("https://opensheet.elk.sh/1J3oLyFZNPU-DJRSrhNjsxbEZX0ZGY_aebuuqIDW9sVU/Form Responses 1")
.then(res=>res.json())
.then(data=>{

let villes={};

data.forEach(p=>{

if(!villes[p.Ville]){
villes[p.Ville]=[];
}

villes[p.Ville].push(p);

});

let container=document.getElementById("premium");

for(let ville in villes){

container.innerHTML+=`

<div class="ville">

<h4>${ville}</h4>

<div class="scroll" id="ville-${ville}"></div>

</div>

`;

let zone=document.getElementById("ville-"+ville);

villes[ville].forEach(p=>{

zone.innerHTML+=`

<div class="profil">

<h5>${p.Nom}</h5>

<p>${p.Age} ans</p>

<p>${p.Quartier}</p>

<a href="https://wa.me/${p.WhatsApp}">
<button>WhatsApp</button>
</a>

</div>

`;

});

}

});

</script>

</body>
</html>
