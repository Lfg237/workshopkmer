<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkshopKmer - Gestion</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#0b0f1a; color:#fff; padding:1rem; }
h2{margin-top:1rem;}
input,textarea,select,button{margin:0.3rem 0; padding:0.5rem; border-radius:8px; border:none;}
button{cursor:pointer;}
.btn-whatsapp{background:#25D366;color:#fff;font-weight:bold;}
.btn-block{background:#f87171;color:#fff;}
.btn-unblock{background:#34d399;color:#000;}
.btn-delete{background:#ef4444;color:#fff;}
.btn-clear{background:#facc15;color:#000;}
small{font-size:10px;color:#ccc;}
.profile img{width:50px;height:50px;border-radius:50%;object-fit:cover;margin-right:0.5rem;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:1rem;}
th,td{padding:0.4rem;border:1px solid #444;text-align:center;font-size:12px;}
th{background:#4f46e5;}
#profilePage{display:none; border:1px solid #444; padding:0.5rem; margin-top:1rem;}
a{color:#60a5fa;}
#mediaList{display:flex; overflow-x:auto; gap:5px;}
#chatBox{border:1px solid #444; padding:0.5rem; height:200px; overflow-y:auto; margin-top:0.5rem;}
#logoTitle{font-family:'Courier New', monospace; font-size:24px; font-weight:bold; white-space:nowrap; overflow:hidden; border-right:2px solid #fff;}
#clock{margin-top:0.5rem; font-size:14px;}
</style>
</head>
<body>

<!-- Logo et titre animé -->
<div id="logoTitle"></div>
<div id="clock">Heures : </div>

<h2>Créer votre compte</h2>
<input type="text" id="email" placeholder="Email">
<input type="text" id="companyName" placeholder="Nom de l'entreprise">
<input type="text" id="phone1" placeholder="Téléphone 1">
<input type="text" id="phone2" placeholder="Téléphone 2">
<input type="text" id="city" placeholder="Ville">
<input type="text" id="quarter" placeholder="Quartier">
<input type="number" id="age" placeholder="Âge">
<input type="file" id="photoFile" accept="image/*">
<img id="previewPhoto" src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Screenshot_20260302-170127.jpg" alt="Aperçu" style="width:50px;height:50px;border-radius:50%;display:block;">
<button onclick="createAccount()">Créer un compte</button>
<button class="btn-whatsapp" onclick="contactAdmin()">Contacter l'administrateur</button>

<hr>

<h2>Utilisateurs</h2>
<input type="text" id="searchUsers" placeholder="Rechercher utilisateur..." oninput="renderUsers()">
<table>
<thead>
<tr>
<th>Photo</th><th>Nom Entreprise</th><th>Ville</th><th>Profil</th>
</tr>
</thead>
<tbody id="usersTableBody"></tbody>
</table>

<hr>

<h2>Accès Administrateur</h2>
<input type="password" id="adminCodeInput" placeholder="Entrez le code admin">
<button onclick="showAdmin()">Accéder Admin</button>
<div id="adminSection" style="display:none;">
<table>
<thead>
<tr>
<th>Nom Entreprise</th><th>Email</th><th>Ville</th><th>Bloqué</th><th>Actions</th>
</tr>
</thead>
<tbody id="adminTableBody"></tbody>
</table>
<button class="btn-clear" onclick="clearHalfMessages()">Supprimer 50% des messages</button>
</div>

<hr>

<div id="profilePage">
<h2>Profil Utilisateur</h2>
<div class="profile">
<img id="profilePhoto" src="" alt="Profil">
<div id="profileInfo"></div>
<label>Ajouter médias :</label>
<input type="file" id="mediaFile" multiple>
<div id="mediaList"></div>
<button onclick="closeProfile()">Fermer Profil</button>
</div>
</div>

<hr>

<h2>Chat Public</h2>
<div id="chatContainer">
<textarea id="messageInput" placeholder="Écrire un message..." rows="2" style="width:100%;"></textarea>
<input type="file" id="chatMedia" multiple>
<button onclick="sendMessage()">Envoyer</button>
<div id="chatBox"></div>
</div>

<script>
// --- Stockage ---
let users = JSON.parse(localStorage.getItem('users')||'[]');
let messages = JSON.parse(localStorage.getItem('messages')||'[]');
let currentUser = JSON.parse(localStorage.getItem('currentUser')||'null');
let blockedUsers = [];

// --- Connexion automatique via URL ---
const urlParams = new URLSearchParams(window.location.search);
const urlUserId = urlParams.get('user');
if(urlUserId){
    const userFromURL = users.find(u=>u.id===urlUserId);
    if(userFromURL){
        currentUser = userFromURL;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        alert("Connexion automatique : "+currentUser.companyName);
    }
}

// --- Logo animé ---
const logoText = "WorkshopKmer";
let i = 0;
function typeLogo(){
  if(i <= logoText.length){
    document.getElementById('logoTitle').textContent = logoText.slice(0,i);
    i++;
    setTimeout(typeLogo, 150);
  }
}
typeLogo();

// --- Horloge locale et Londres ---
function updateClock(){
  const now = new Date();
  const nowLondon = new Date().toLocaleString("en-GB",{timeZone:"Europe/London"});
  document.getElementById('clock').innerHTML = `Heure locale : ${now.toLocaleTimeString()} | Londres : ${new Date(nowLondon).toLocaleTimeString()}`;
}
setInterval(updateClock, 1000);
updateClock();

// --- Prévisualisation photo ---
document.getElementById('photoFile').addEventListener('change', function(){
  const file = this.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      document.getElementById('previewPhoto').src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
});

// --- Créer compte ---
function createAccount(){
  const email = document.getElementById('email').value.trim();
  if(!email){ alert("Email requis"); return; }
  if(users.find(u=>u.email===email)){ alert("Email déjà utilisé"); return; }

  let photoSrc = document.getElementById('previewPhoto').src;
  if(!photoSrc || photoSrc === "") photoSrc = "https://raw.githubusercontent.com/Lfg237/m-dias/main/Screenshot_20260302-170127.jpg";

  const newUser = {
    id: 'u_' + Date.now(),
    email,
    companyName: document.getElementById('companyName').value,
    phone1: document.getElementById('phone1').value,
    phone2: document.getElementById('phone2').value,
    city: document.getElementById('city').value,
    quarter: document.getElementById('quarter').value,
    age: document.getElementById('age').value,
    photo: photoSrc,
    media: [],
    blocked:false
  };

  users.push(newUser);
  localStorage.setItem('users', JSON.stringify(users));
  currentUser = newUser;
  localStorage.setItem('currentUser', JSON.stringify(currentUser));

  renderUsers();
  renderAdminTable();
  alert("Compte créé ! Votre ID : "+newUser.id+"\nLien direct profil : https://workshopkmer.vercel.app/?user="+newUser.id);
}

// --- Contacter admin ---
function contactAdmin(){
  if(!currentUser){ alert("Créez d'abord votre compte"); return; }
  const message=encodeURIComponent("Demande validation compte ID: "+currentUser.id);
  window.open(`https://wa.me/237670035609?text=${message}`,"_blank");
}

// --- Affichage utilisateurs ---
function renderUsers(){
  const tbody=document.getElementById('usersTableBody');
  tbody.innerHTML='';
  const search=document.getElementById('searchUsers').value.toLowerCase();
  users.forEach(u=>{
    if(u.companyName.toLowerCase().includes(search)||u.city.toLowerCase().includes(search)){
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td><img src="${u.photo}" onclick="openProfile('${u.id}')" style="width:40px;height:40px;border-radius:50%;cursor:pointer;"></td>
        <td>${u.companyName}</td>
        <td>${u.city}</td>
        <td><button onclick="openProfile('${u.id}')">Voir Profil</button></td>
      `;
      tbody.appendChild(tr);
    }
  });
}

// --- Profil utilisateur ---
function openProfile(id){
  const user = users.find(u=>u.id===id);
  if(!user) return;
  currentUser = user;
  localStorage.setItem('currentUser', JSON.stringify(currentUser));
  document.getElementById('profilePage').style.display='block';
  document.getElementById('profilePhoto').src=user.photo;
  document.getElementById('profileInfo').innerHTML=`
    <small>ID: ${user.id}</small><br>
    <small>Email: ${user.email}</small><br>
    <small>Nom Entreprise: ${user.companyName}</small><br>
    <small>Tel1: ${user.phone1}</small><br>
    <small>Tel2: ${user.phone2}</small><br>
    <small>Ville: ${user.city}</small><br>
    <small>Quartier: ${user.quarter}</small><br>
    <small>Âge: ${user.age}</small><br>
    <button onclick="copyLink('${user.id}')">Copier lien du profil</button>
  `;
  renderMedia(user);
}

function copyLink(id){
  const link = `https://workshopkmer.vercel.app/?user=${id}`;
  navigator.clipboard.writeText(link).then(()=>alert("Lien copié : "+link));
}

function closeProfile(){ document.getElementById('profilePage').style.display='none'; }

// --- Ajouter médias ---
document.getElementById('mediaFile').addEventListener('change', function(){
  if(!currentUser) return;
  const files=Array.from(this.files);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){ 
      currentUser.media.push(e.target.result);
      renderMedia(currentUser);
      localStorage.setItem('users', JSON.stringify(users));
    }
    reader.readAsDataURL(file);
  });
});

function renderMedia(userForMedia){
  const container=document.getElementById('mediaList');
  container.innerHTML='';
  const user = userForMedia || currentUser;
  if(!user || !user.media) return;
  user.media.forEach((m,i)=>{
    const ext=m.split(';')[0].split('/')[1].toLowerCase();
    let el;
    if(['jpeg','png','jpg'].includes(ext)) el=`<img src="${m}" style="width:50px;height:50px;margin:2px;">`;
    else if(ext==='mp4') el=`<video src="${m}" controls style="width:80px;height:50px;margin:2px;"></video>`;
    else if(ext==='mp3') el=`<audio src="${m}" controls style="width:80px;margin:2px;"></audio>`;
    else el=`<a href="${m}" target="_blank">Fichier ${i+1}</a>`;
    container.innerHTML+=el;
  });
}

// --- Chat ---
document.getElementById('chatMedia').addEventListener('change', function(){
  if(!currentUser) return;
  if(blockedUsers.includes(currentUser.id)){ alert("Vous êtes bloqué pour envoyer des messages"); return; }
  const files=Array.from(this.files);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){ 
      messages.push({userId:currentUser.id,email:currentUser.companyName,text:'[Média]',media:e.target.result});
      localStorage.setItem('messages', JSON.stringify(messages));
      renderChat();
    }
    reader.readAsDataURL(file);
  });
});

function renderChat(){
  const chatBox=document.getElementById('chatBox');
  chatBox.innerHTML='';
  const displayMessages = messages.slice(-50);
  displayMessages.forEach(msg=>{
    const blocked = blockedUsers.includes(msg.userId);
    let content = msg.text;
    if(msg.media){
      const ext = msg.media.split(';')[0].split('/')[1].toLowerCase();
      if(['jpeg','png','jpg'].includes(ext)) content += `<br><img src="${msg.media}" style="width:50px;height:50px;margin:2px;">`;
      else if(ext==='mp4') content += `<br><video src="${msg.media}" controls style="width:100px;height:60px;"></video>`;
      else if(ext==='mp3') content += `<br><audio src="${msg.media}" controls></audio>`;
      else content += `<br><a href="${msg.media}" target="_blank">Fichier</a>`;
    }
    chatBox.innerHTML += `<div><b>${msg.email}:</b> ${content} ${blocked?'<small>(Bloqué)</small>':''}</div>`;
  });
}

function sendMessage(){
  if(!currentUser){ alert("Créez un compte d'abord"); return; }
  if(blockedUsers.includes(currentUser.id)){ alert("Vous êtes bloqué pour envoyer des messages"); return; }
  const text = document.getElementById('messageInput').value.trim();
  if(!text) return;
  const textWithLinks = text.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
  messages.push({userId:currentUser.id,email:currentUser.companyName,text:textWithLinks});
  localStorage.setItem('messages', JSON.stringify(messages));
  document.getElementById('messageInput').value='';
  renderChat();
}

// --- Admin ---
function showAdmin(){
  const code=document.getElementById('adminCodeInput').value;
  if(code==='233233'){ document.getElementById('adminSection').style.display='block'; renderAdminTable(); }
  else alert("Code incorrect");
}

function renderAdminTable(){
  const tbody=document.getElementById('adminTableBody');
  tbody.innerHTML='';
  users.forEach(u=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${u.companyName}</td>
      <td>${u.email}</td>
      <td>${u.city}</td>
      <td>${u.blocked?'Oui':'Non'}</td>
      <td>
        <button class="${u.blocked?'btn-unblock':'btn-block'}" onclick="toggleBlock('${u.id}')">${u.blocked?'Débloquer':'Bloquer'}</button>
        <button class="btn-delete" onclick="deleteUser('${u.id}')">Supprimer</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function toggleBlock(id){
  users = users.map(u=>u.id===id?{...u,blocked:!u.blocked}:u);
  localStorage.setItem('users', JSON.stringify(users));
  blockedUsers = users.filter(u=>u.blocked).map(u=>u.id);
  renderAdminTable();
  renderChat();
}

function deleteUser(id){
  if(confirm("Supprimer cet utilisateur et ses médias ?")){
    users = users.filter(u=>u.id!==id);
    localStorage.setItem('users', JSON.stringify(users));
    messages = messages.filter(m=>m.userId!==id);
    localStorage.setItem('messages', JSON.stringify(messages));
    blockedUsers = users.filter(u=>u.blocked).map(u=>u.id);
    renderAdminTable();
    renderUsers();
    renderChat();
  }
}

function clearHalfMessages(){
  const half=Math.floor(messages.length/2);
  messages=messages.slice(half);
  localStorage.setItem('messages', JSON.stringify(messages));
  renderChat();
}

// --- Initialisation ---
renderUsers();
renderChat();
blockedUsers = users.filter(u=>u.blocked).map(u=>u.id);

// --- Ouvrir profil automatiquement si ID dans URL ---
if(urlUserId) openProfile(urlUserId);
</script>
</body>
</html>
