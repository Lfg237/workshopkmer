<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkshopKmer</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#0b0f1a; color:#fff; padding:1rem; }
header{display:flex;align-items:center;justify-content:space-between;}
header img{width:50px;height:50px;border-radius:50%;}
h1{margin-left:0.5rem;font-size:1.5rem;}
#clocks{display:flex;gap:0.5rem;overflow-x:auto;margin-top:0.5rem;}
.clock{background:#1f2937;padding:0.3rem 0.5rem;border-radius:5px;white-space:nowrap;}
input,textarea,select,button{margin:0.2rem 0; padding:0.5rem; border-radius:8px; border:none;}
button{cursor:pointer;}
.btn-whatsapp{background:#25D366;color:#fff;font-weight:bold;}
.btn-block{background:#f87171;color:#fff;}
.btn-unblock{background:#34d399;color:#000;}
.btn-delete{background:#ef4444;color:#fff;}
.btn-clear{background:#facc15;color:#000;}
small{font-size:10px;color:#ccc;}
.profile img{width:50px;height:50px;border-radius:50%;object-fit:cover;margin-right:0.5rem;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:1rem;}
th,td{padding:0.4rem;border:1px solid #444;text-align:center;font-size:12px;}
th{background:#4f46e5;}
#profilePage{display:none; border:1px solid #444; padding:0.5rem; margin-top:1rem;}
#mediaScroll{display:flex;overflow-x:auto;gap:5px;padding:5px;border:1px solid #444;}
#chatBox{border:1px solid #444; padding:0.5rem; height:300px; overflow-y:auto;}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <img src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Screenshot_20260302-170127.jpg" alt="Logo">
    <h1>WorkshopKmer</h1>
  </div>
</header>

<div id="clocks"></div>

<h2>Créer votre compte</h2>
<div style="max-width:400px;">
<input type="text" id="email" placeholder="Email">
<input type="text" id="companyName" placeholder="Nom de l'entreprise">
<input type="text" id="phone1" placeholder="Téléphone 1">
<input type="text" id="phone2" placeholder="Téléphone 2">
<input type="text" id="city" placeholder="Ville">
<input type="text" id="quarter" placeholder="Quartier">
<input type="number" id="age" placeholder="Âge">
<input type="file" id="photoFile" accept="image/*">
<img id="previewPhoto" src="" alt="Aperçu" style="width:50px;height:50px;border-radius:50%;display:block;">
<button onclick="createAccount()">Créer un compte</button>
<button class="btn-whatsapp" onclick="contactAdmin()">Contacter l'administrateur</button>
</div>

<hr>

<h2>Utilisateurs</h2>
<input type="text" id="searchUsers" placeholder="Rechercher utilisateur..." oninput="renderUsers()">
<table>
<thead>
<tr>
<th>Photo</th><th>Nom Entreprise</th><th>Ville</th><th>Profil</th><th>Copier lien</th>
</tr>
</thead>
<tbody id="usersTableBody"></tbody>
</table>

<hr>

<h2>Profil Utilisateur</h2>
<div id="profilePage">
<div class="profile">
<img id="profilePhoto" src="" alt="Profil">
<div id="profileInfo"></div>
<label>Ajouter médias :</label>
<input type="file" id="mediaFile" multiple>
<div id="mediaScroll"></div>
<button onclick="closeProfile()">Fermer Profil</button>
</div>
</div>

<hr>

<h2>Chat Public</h2>
<div id="chatContainer">
<textarea id="messageInput" placeholder="Écrire un message..." rows="3" style="width:100%;"></textarea>
<input type="file" id="chatMedia" multiple>
<button onclick="sendMessage()">Envoyer</button>
<div id="chatBox"></div>
</div>

<script>
// --- Horloges ---
const countries=[{name:'Cameroun',offset:1},{name:'France',offset:1},{name:'USA',offset:-5},{name:'Afrique du Sud',offset:2},{name:'Chine',offset:8},{name:'Russie',offset:3},{name:'Japon',offset:9},{name:'Brésil',offset:-3},{name:'Royaume-Uni',offset:0},{name:'Canada',offset:-5}];
function updateClocks(){
  const container=document.getElementById('clocks');
  container.innerHTML='';
  countries.forEach(c=>{
    const d=new Date();
    const utc=d.getTime() + d.getTimezoneOffset()*60000;
    const nd=new Date(utc + 3600000*c.offset);
    const div=document.createElement('div');
    div.className='clock';
    div.textContent=`${c.name}: ${nd.toLocaleTimeString()}`;
    container.appendChild(div);
  });
}
setInterval(updateClocks,1000);
updateClocks();

// --- Stockage ---
let users=JSON.parse(localStorage.getItem('users')||'[]');
let messages=JSON.parse(localStorage.getItem('messages')||'[]');
let currentUser=JSON.parse(localStorage.getItem('currentUser')||'null');
let blockedUsers=[];

// --- Connexion persistante ---
if(currentUser) console.log("Utilisateur connecté :",currentUser.companyName);

// --- Prévisualisation photo ---
document.getElementById('photoFile').addEventListener('change',function(){
  const file=this.files[0];
  if(file){ const reader=new FileReader(); reader.onload=function(e){document.getElementById('previewPhoto').src=e.target.result;} reader.readAsDataURL(file);}
});

// --- Créer compte ---
function createAccount(){
  const email=document.getElementById('email').value.trim();
  if(!email){ alert("Email requis"); return; }
  if(users.find(u=>u.email===email)){ alert("Email déjà utilisé"); return; }
  const newUser={id:'u_'+Date.now(),email,companyName:document.getElementById('companyName').value,phone1:document.getElementById('phone1').value,phone2:document.getElementById('phone2').value,city:document.getElementById('city').value,quarter:document.getElementById('quarter').value,age:document.getElementById('age').value,photo:document.getElementById('previewPhoto').src||"https://raw.githubusercontent.com/Lfg237/m-dias/main/Screenshot_20260302-170127.jpg",media:[],blocked:false};
  users.push(newUser);
  localStorage.setItem('users',JSON.stringify(users));
  currentUser=newUser;
  localStorage.setItem('currentUser',JSON.stringify(currentUser));
  renderUsers();
  alert("Compte créé ! Votre ID : "+newUser.id);
}

// --- Contacter admin ---
function contactAdmin(){
  if(!currentUser){ alert("Créez d'abord votre compte"); return; }
  const message=encodeURIComponent("Demande validation compte ID: "+currentUser.id);
  window.open(`https://wa.me/237670035609?text=${message}`,"_blank");
}

// --- Affichage utilisateurs ---
function renderUsers(){
  const tbody=document.getElementById('usersTableBody');
  tbody.innerHTML='';
  const search=document.getElementById('searchUsers').value.toLowerCase();
  users.forEach(u=>{
    if(u.companyName.toLowerCase().includes(search)||u.city.toLowerCase().includes(search)){
      const tr=document.createElement('tr');
      tr.innerHTML=`<td><img src="${u.photo}" onclick="openProfile('${u.id}')" style="width:40px;height:40px;border-radius:50%;cursor:pointer;"></td><td>${u.companyName}</td><td>${u.city}</td><td><button onclick="openProfile('${u.id}')">Voir Profil</button></td><td><button onclick="copyLink('${u.id}')">Copier lien</button></td>`;
      tbody.appendChild(tr);
    }
  });
}

// --- Copier lien profil ---
function copyLink(id){navigator.clipboard.writeText(`${window.location.href}?user=${id}`); alert("Lien copié !");}

// --- Profil ---
function openProfile(id){
  const user=users.find(u=>u.id===id);
  if(!user) return;
  document.getElementById('profilePage').style.display='block';
  document.getElementById('profilePhoto').src=user.photo;
  document.getElementById('profileInfo').innerHTML=`<small>Email: ${user.email}</small><br><small>Nom Entreprise: ${user.companyName}</small><br><small>Tel1: ${user.phone1}</small><br><small>Tel2: ${user.phone2}</small><br><small>Ville: ${user.city}</small><br><small>Quartier: ${user.quarter}</small><br><small>Âge: ${user.age}</small>`;
  const mediaDiv=document.getElementById('mediaScroll');
  mediaDiv.innerHTML='';
  user.media.forEach(m=>{
    const ext=m.split(';')[0].split('/')[1];
    let el;
    if(ext==='jpeg'||ext==='png'||ext==='jpg') el=`<img src="${m}" style="height:80px;">`;
    else if(ext==='mp4') el=`<video src="${m}" controls style="height:80px;"></video>`;
    else if(ext==='mp3') el=`<audio src="${m}" controls></audio>`;
    else el=`<a href="${m}" target="_blank">Fichier</a>`;
    mediaDiv.innerHTML+=el;
  });
}

function closeProfile(){document.getElementById('profilePage').style.display='none';}

// --- Ajouter médias ---
document.getElementById('mediaFile').addEventListener('change',function(){
  if(!currentUser) return;
  Array.from(this.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){currentUser.media.push(e.target.result);renderProfileMedia(currentUser); localStorage.setItem('users',JSON.stringify(users));}
    reader.readAsDataURL(file);
  });
});
function renderProfileMedia(user){
  const mediaDiv=document.getElementById('mediaScroll');
  mediaDiv.innerHTML='';
  user.media.forEach(m=>{
    const ext=m.split(';')[0].split('/')[1];
    let el;
    if(ext==='jpeg'||ext==='png'||ext==='jpg') el=`<img src="${m}" style="height:80px;">`;
    else if(ext==='mp4') el=`<video src="${m}" controls style="height:80px;"></video>`;
    else if(ext==='mp3') el=`<audio src="${m}" controls></audio>`;
    else el=`<a href="${m}" target="_blank">Fichier</a>`;
    mediaDiv.innerHTML+=el;
  });
}

// --- Chat ---
document.getElementById('chatMedia').addEventListener('change',function(){
  if(!currentUser) return;
  Array.from(this.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){messages.push({userId:currentUser.id,email:currentUser.companyName,text:'[Média]',media:e.target.result});localStorage.setItem('messages',JSON.stringify(messages));renderChat();}
    reader.readAsDataURL(file);
  });
});
function renderChat(){const chatBox=document.getElementById('chatBox');chatBox.innerHTML='';messages.forEach(msg=>{let content=msg.text;if(msg.media){const ext=msg.media.split(';')[0].split('/')[1];if(ext==='jpeg'||ext==='png'||ext==='jpg') content+=`<br><img src="${msg.media}" style="width:50px;height:50px;margin:2px;">`;else if(ext==='mp4') content+=`<br><video src="${msg.media}" controls style="width:100px;height:60px;"></video>`;else if(ext==='mp3') content+=`<br><audio src="${msg.media}" controls></audio>`;else content+=`<br><a href="${msg.media}" target="_blank">Fichier</a>`;}chatBox.innerHTML+=`<div><b>${msg.email}:</b> ${content}</div>`;});}
function sendMessage(){if(!currentUser){alert("Créez un compte d'abord");return;}const text=document.getElementById('messageInput').value.trim();if(!text && !document.getElementById('chatMedia').files.length) return;const textWithLinks=text.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');messages.push({userId:currentUser.id,email:currentUser.companyName,text:textWithLinks});localStorage.setItem('messages',JSON.stringify(messages));document.getElementById('messageInput').value='';renderChat();}

// --- Initialisation ---
renderUsers();
renderChat();
</script>

</body>
</html>
