<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#f4f6fb;color:#333;}

.header{
display:flex;justify-content:space-between;align-items:center;
padding:15px;background:#0f172a;color:white;flex-wrap:wrap;
}

.logo{width:40px;border-radius:50%;}
.header-left{display:flex;align-items:center;gap:10px;}

.header-right button{

}

.btn-offre{background:#f59e0b;color:white;}

.btn-premium{background:#ec4899;color:white;}

.search{padding:15px;}

.categories{display:flex;gap:10px;overflow-x:auto;padding:10px;}

.section{padding:15px;}

.categorie-scroll{display:flex;gap:15px;overflow-x:auto;}

.offre,.profil{

}

.offre{min-width:260px;}
.profil{min-width:220px;position:relative;}

.offre button,.profil button{
margin-top:8px;background:#25d366;border:none;
padding:8px;border-radius:8px;color:white;cursor:pointer;width:100%;
}

.badge{
position:absolute;top:10px;right:10px;
padding:3px 8px;border-radius:8px;color:white;font-size:11px;
}
.attente{background:#f59e0b;}
.verifie{background:#22c55e;}
.premium{background:#8b5cf6;}

.whatsapp-float{
position:fixed;bottom:80px;right:20px;
background:#25d366;color:white;font-size:24px;
padding:15px;border-radius:50%;
}

h3{margin:10px 0;color:#2563eb;}
</style>
</head>

<body>

<header class="header">

<script>

let profilsData = [

},
{

},
{

},
{

statut:"premium"
},
{

},
{

},
{

}

// ================= UTILS =================

function clean(n){
let num=(n||"").toString().replace(/\D/g,'')
if(num.startsWith("237")) return num
if(num.length===9) return "237"+num
return ""
}

// ================= WHATSAPP =================

function wa(n, info){
if(!n){alert("Numéro invalide");return}

let message="Bonjour 👋\n"
+"Je viens de workshopkmer.\n\n"
+"📌 "+info+"\n\n"
+"🔗 https://workshopkmer.vercel.app/#job1\n\n"

window.open("https://wa.me/"+n+"?text="+encodeURIComponent(message))
}

// ================= OFFRES =================

function afficherOffres(){

let offresDiv=document.getElementById("offres")
let catDiv=document.getElementById("categories")

offresDiv.innerHTML=""
catDiv.innerHTML=""

let cats={}

offresData.forEach(o=>{
let cat=o.categorie||"Autres"
if(!cats[cat]) cats[cat]=[]
cats[cat].push(o)
})

for(let cat in cats){

catDiv.innerHTML+=`<button onclick="scrollCat('${cat}')">${cat}</button>`

offresDiv.innerHTML+=`
<h3 id="${cat}">${cat}</h3>
<div class="categorie-scroll" id="zone-${cat}"></div>
`

let zone=document.getElementById("zone-"+cat)

cats[cat].forEach(o=>{

let num=clean(o.whatsapp)
let lieu=o.ville+(o.quartier?" - "+o.quartier:"")

zone.innerHTML+=`
<div class="offre">
<h4>${o.recruteur}</h4>
<p><b>Poste :</b> ${o.poste}</p>
<p><b>Lieu :</b> ${lieu}</p>
<p>${o.description}</p>
<button onclick="wa('${num}','${o.poste}')">📲 WhatsApp</button>
</div>`
})

}

}

// ================= PROFILS =================

function afficherProfils(){

let container=document.getElementById("premium")
container.innerHTML=""

let metiers={}

// 🔥 regrouper par métier
profilsData.forEach(p=>{
let m = p.competence || p["métier"] || "Autres"
if(!metiers[m]) metiers[m]=[]
metiers[m].push(p)
})

// 🔥 affichage
for(let m in metiers){

container.innerHTML+=`
<h3>${m}</h3>
<div class="categorie-scroll" id="zone-${m}"></div>
`

let zone=document.getElementById("zone-"+m)

metiers[m].forEach(p=>{

let num = clean(p.whatsapp || p["WhatsApp"] || "")
let nom = p.nom || p["nom et prénom"] || ""

let age = p.age || ""
let experience = p.experience || p["expérience"] || ""
let description = p.description || ""

let ville = p.ville || ""
let quartier = p.quartier || ""
let lieu = ville + (quartier ? " - " + quartier : "")

let statut = (p.statut || "attente").toLowerCase()

zone.innerHTML+=`
<div class="profil">

<span class="badge ${statut}">${statut}</span>

<h4>${nom}</h4>

<p><b>📍 Localisation :</b> ${lieu}</p>

${age ? `<p><b>🎂 Âge :</b> ${age}</p>` : ""}

${experience ? `<p><b>💼 Expérience :</b> ${experience}</p>` : ""}

${description ? `<p><b>📝 Description :</b> ${description}</p>` : ""}

<p><b>🛠 Métier :</b> ${m}</p>

<button onclick="wa('${num}','${nom.replace(/'/g," ")}')">
📲 Contacter sur WhatsApp
</button>

</div>`
})

}

}

// ================= SEARCH =================

function rechercher(){

let val=document.getElementById("search").value.toLowerCase()

if(!val){
afficherOffres()
return
}

let filtres=offresData.filter(o=>{
let txt=(o.recruteur+" "+o.poste+" "+o.ville+" "+o.quartier+" "+o.description).toLowerCase()
return txt.includes(val)
})

offresData=filtres
afficherOffres()

}

// ================= NAV =================

function scrollCat(cat){
document.getElementById(cat).scrollIntoView({behavior:"smooth"})
}

function voirPremium(){
document.getElementById("premium").scrollIntoView({behavior:"smooth"})
}

function ouvrirFormOffre(){
window.open("https://forms.gle/SgeUAdndex6Ch9Fh8")
}

function ouvrirFormPremium(){
window.open("https://forms.gle/qNs3xAPf2UUU7NhC9")
}

// ================= INIT =================

afficherOffres()
afficherProfils()

</script>
