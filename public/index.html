<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORKSHOPKMER</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:white;padding:1rem;}
header{background:#111827;padding:15px;text-align:center;font-size:28px;font-weight:bold;display:flex;align-items:center;justify-content:center;gap:10px;}
header img{height:40px;}
.animated-title{animation:wave 2s infinite;}
@keyframes wave{0%{transform:rotate(0deg);}25%{transform:rotate(5deg);}50%{transform:rotate(0deg);}75%{transform:rotate(-5deg);}100%{transform:rotate(0deg);}}
input,button,textarea{padding:8px;margin:5px 0;border-radius:6px;border:none;}
button{background:#2563eb;color:white;cursor:pointer;}
button:hover{opacity:0.8;}
table{width:100%;border-collapse:collapse;margin-top:1rem;}
td,th{padding:8px;border-bottom:1px solid #333;text-align:center;}
#profilePage{display:none;background:#1e293b;padding:15px;margin-top:15px;border-radius:12px;}
#mediaList{display:flex;gap:10px;overflow-x:auto;padding:10px 0;}
#mediaList img,#mediaList video{height:220px;border-radius:12px;object-fit:cover;}
#mediaList audio{width:250px;}
#chatBox{height:300px;overflow-y:auto;background:#111827;padding:10px;border-radius:10px;margin-bottom:10px;}
.message{margin-bottom:10px;}
.message b{color:#60a5fa;}
#userIdDisplay{margin-top:10px;font-size:14px;color:#60a5fa;}
.btn-block{background:#f87171;color:#fff;}
.btn-unblock{background:#34d399;color:#000;}
.btn-delete{background:#ef4444;color:#fff;}
.copy-link{background:#facc15;color:#000;}
</style>
</head>
<body>

<header>
<img src="https://via.placeholder.com/40" alt="Logo">
<div class="animated-title">WORKSHOPKMER</div>
</header>
<div id="userIdDisplay"></div>

<section>
<h3>Créer un compte</h3>
<input type="text" id="companyName" placeholder="Nom entreprise"><br>
<input type="text" id="prestations" placeholder="Prestations"><br>
<input type="text" id="city" placeholder="Ville"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="text" id="whatsapp" placeholder="Numéro WhatsApp"><br>
<input type="file" id="photoFile" accept="image/*"><br>
<button onclick="createAccount()">Créer un compte</button>
<button onclick="contactAdmin()">Contacter Admin</button>

<hr>

<h3>Utilisateurs</h3>
<input type="text" id="searchUsers" placeholder="Rechercher..." oninput="renderUsers()">
<table>
<thead><tr><th>Photo</th><th>Nom Entreprise</th><th>Ville</th><th>ID</th><th>Status</th><th>Actions</th></tr></thead>
<tbody id="usersTableBody"></tbody>
</table>

<div id="profilePage">
<h3>Profil</h3>
<img id="profilePhoto" width="120" style="border-radius:50%"><br>
<div id="profileInfo"></div>
<button onclick="closeProfile()">Fermer Profil</button>
<button id="whatsappBtn">WhatsApp</button>
<div id="mediaList"></div>
<input type="file" id="mediaFile" multiple>
</div>

<hr>

<h3>Discussion</h3>
<div id="chatBox"></div>
<textarea id="messageInput" placeholder="Votre message"></textarea><br>
<input type="file" id="chatMedia" multiple><br>
<button onclick="sendMessage()">Envoyer</button>

<hr>

<h3>Accès Administrateur</h3>
<input type="password" id="adminCodeInput" placeholder="Code admin">
<button onclick="showAdmin()">Accéder Admin</button>
<div id="adminSection" style="display:none;">
<table>
<thead><tr><th>Nom Entreprise</th><th>Email</th><th>Ville</th><th>Bloqué</th><th>Actions</th></tr></thead>
<tbody id="adminTableBody"></tbody>
</table>
</div>

</section>

<script>
// ======================
// IDs VALIDÉS
// ======================
const validatedUsers = [
  "u_1772525310883",
  "u_1772527367504"
];

// ======================
// STOCKAGE
// ======================
let users = JSON.parse(localStorage.getItem('users') || '[]');
let messages = JSON.parse(localStorage.getItem('messages') || '[]');
let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
let blockedUsers = users.filter(u=>u.blocked).map(u=>u.id);

// ======================
// AFFICHAGE ID
// ======================
function showCurrentUserId(){
  if(currentUser){
    document.getElementById('userIdDisplay').innerText = "Votre ID : " + currentUser.id;
  } else {
    document.getElementById('userIdDisplay').innerText = "";
  }
}

// ======================
// CREATION COMPTE
// ======================
function createAccount(){
  const email = document.getElementById('email').value.trim();
  if(!email){ alert("Email requis"); return; }
  if(users.find(u=>u.email===email)){ alert("Email déjà utilisé"); return; }

  const reader = new FileReader();
  const file = document.getElementById('photoFile').files[0];
  reader.onload = function(e){
    const id = "u_" + Date.now();
    const newUser = {
      id,
      companyName:document.getElementById('companyName').value,
      prestations:document.getElementById('prestations').value,
      city:document.getElementById('city').value,
      email,
      whatsapp:document.getElementById('whatsapp').value,
      photo:e.target.result || "https://via.placeholder.com/150",
      media:[],
      blocked:false,
      validated: validatedUsers.includes(id)
    };
    users.push(newUser);
    localStorage.setItem('users', JSON.stringify(users));
    currentUser = newUser;
    localStorage.setItem('currentUser', JSON.stringify(currentUser));
    alert("Compte créé ✅\nID : " + id);
    renderUsers();
    showCurrentUserId();
    renderAdminTable();
  };
  if(file){ reader.readAsDataURL(file); }
  else{ reader.onload({target:{result:"https://via.placeholder.com/150"}}); }
}

// ======================
// CONTACT ADMIN
// ======================
function contactAdmin(){
  if(!currentUser){ alert("Créez un compte d'abord"); return; }
  const message = encodeURIComponent("Demande validation compte ID: "+currentUser.id);
  window.open(`https://wa.me/237670035609?text=${message}`,"_blank");
}

// ======================
// UTILISATEURS
// ======================
function renderUsers(){
  const tbody = document.getElementById('usersTableBody');
  const search = document.getElementById('searchUsers').value.toLowerCase();
  tbody.innerHTML = "";
  users.forEach(u=>{
    if(u.companyName.toLowerCase().includes(search)||u.city.toLowerCase().includes(search)){
      const status = validatedUsers.includes(u.id) ? "✅" : "❌";
      tbody.innerHTML += `
        <tr>
          <td><img src="${u.photo}" width="40" style="border-radius:50%"></td>
          <td>${u.companyName}</td>
          <td>${u.city}</td>
          <td>${u.id}</td>
          <td>${status}</td>
          <td>
            <button onclick="openProfile('${u.id}')">Voir Profil</button>
            <button class="copy-link" onclick="copyProfileLink('${u.id}')">Copier Lien</button>
          </td>
        </tr>
      `;
    }
  });
}

// ======================
// PROFIL
// ======================
function openProfile(id){
  const user = users.find(u=>u.id===id);
  if(!user) return;
  currentUser = user;
  document.getElementById('profilePage').style.display='block';
  document.getElementById('profilePhoto').src = user.photo;
  document.getElementById('profileInfo').innerHTML = `
    <b>${user.companyName}</b><br>
    Prestations: ${user.prestations}<br>
    Ville: ${user.city}<br>
    ID: ${user.id}<br>
    WhatsApp: ${user.whatsapp}<br>
    Status: ${validatedUsers.includes(user.id)?"✅ Validé":"❌ Non validé"}
  `;
  const waBtn = document.getElementById('whatsappBtn');
  if(user.whatsapp){ waBtn.style.display="inline-block"; waBtn.onclick = ()=> window.open(`https://wa.me/${user.whatsapp}`,"_blank"); }
  else waBtn.style.display="none";
  renderMedia(user);
}

function closeProfile(){ 
  document.getElementById('profilePage').style.display='none'; 
  currentUser=null; 
  showCurrentUserId(); 
}

// ======================
// MEDIA PROFIL
// ======================
document.getElementById('mediaFile').addEventListener('change', function(){
  if(!currentUser){ alert("Créez un compte d'abord"); return; }
  const files = Array.from(this.files);
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = function(e){
      const index = users.findIndex(u=>u.id===currentUser.id);
      if(index===-1) return;
      users[index].media.push(e.target.result);
      localStorage.setItem('users', JSON.stringify(users));
      renderMedia(users[index]);
    };
    reader.readAsDataURL(file);
  });
});

function renderMedia(user){
  const container = document.getElementById('mediaList');
  container.innerHTML="";
  if(!user.media) return;
  user.media.forEach((m,i)=>{
    if(m.startsWith("data:image")) container.innerHTML += `<img src="${m}">`;
    else if(m.startsWith("data:video")) container.innerHTML += `<video src="${m}" controls></video>`;
    else if(m.startsWith("data:audio")) container.innerHTML += `<audio src="${m}" controls></audio>`;
    else container.innerHTML += `<a href="${m}" target="_blank">Fichier ${i+1}</a>`;
  });
}

// ======================
// COPIER LIEN PROFIL
// ======================
function copyProfileLink(id){
  const url = `${window.location.origin}?id=${id}`;
  navigator.clipboard.writeText(url);
  alert("Lien copié ! : " + url);
}

// ======================
// CHAT
// ======================
document.getElementById('chatMedia').addEventListener('change', function(){
  if(!currentUser){ alert("Créez un compte d'abord"); return; }
  const files = Array.from(this.files);
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = function(e){
      messages.push({userId:currentUser.id,name:currentUser.companyName,media:e.target.result});
      localStorage.setItem('messages', JSON.stringify(messages));
      renderChat();
    };
    reader.readAsDataURL(file);
  });
});

function sendMessage(){
  if(!currentUser){ alert("Créez un compte d'abord"); return; }
  const text = document.getElementById('messageInput').value.trim();
  if(!text && !document.getElementById('chatMedia').files.length) return;
  messages.push({userId:currentUser.id,name:currentUser.companyName,text});
  localStorage.setItem('messages', JSON.stringify(messages));
  document.getElementById('messageInput').value="";
  renderChat();
}

function renderChat(){
  const box = document.getElementById('chatBox');
  box.innerHTML="";
  messages.forEach(m=>{
    let content = m.text||"";
    if(m.media){
      if(m.media.startsWith("data:image")) content+=`<br><img src="${m.media}" width="150">`;
      else if(m.media.startsWith("data:video")) content+=`<br><video src="${m.media}" width="200" controls></video>`;
      else if(m.media.startsWith("data:audio")) content+=`<br><audio src="${m.media}" controls></audio>`;
      else content+=`<br><a href="${m.media}" target="_blank">Fichier</a>`;
    }
    content = content.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
    box.innerHTML += `<div class="message"><b>${m.name}:</b> ${content}</div>`;
  });
  box.scrollTop = box.scrollHeight;
}

// ======================
// ADMIN
// ======================
function showAdmin(){
  const code=document.getElementById('adminCodeInput').value;
  if(code==='233233'){ document.getElementById('adminSection').style.display='block'; renderAdminTable(); }
  else alert("Code incorrect");
}

function renderAdminTable(){
  const tbody=document.getElementById('adminTableBody');
  tbody.innerHTML='';
  users.forEach(u=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${u.companyName}</td>
      <td>${u.email}</td>
      <td>${u.city}</td>
      <td>${u.blocked?'Oui':'Non'}</td>
      <td>
        <button class="${u.blocked?'btn-unblock':'btn-block'}" onclick="toggleBlock('${u.id}')">${u.blocked?'Débloquer':'Bloquer'}</button>
        <button class="btn-delete" onclick="deleteUser('${u.id}')">Supprimer</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function toggleBlock(id){
  users=users.map(u=>u.id===id?{...u,blocked:!u.blocked}:u);
  localStorage.setItem('users', JSON.stringify(users));
  blockedUsers=users.filter(u=>u.blocked).map(u=>u.id);
  renderAdminTable();
  renderChat();
}

function deleteUser(id){
  if(confirm("Supprimer cet utilisateur et ses médias ?")){
    users=users.filter(u=>u.id!==id);
    messages=messages.filter(m=>m.userId!==id);
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('messages', JSON.stringify(messages));
    blockedUsers=users.filter(u=>u.blocked).map(u=>u.id);
    renderAdminTable();
    renderUsers();
    renderChat();
  }
}

// ======================
// INIT
// ======================
showCurrentUserId();
renderUsers();
renderChat();
</script>

</body>
</html>
