<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>workshopkmer</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:rgba(0,0,0,0.6);
flex-wrap:wrap;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
}

.site-title{
font-size:18px;
font-weight:bold;
}

.header-center{
display:flex;
gap:15px;
font-size:22px;
}

.header-center a{
color:white;
}

.header-right{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn-offre{
background:#ff9800;
border:none;
padding:8px 14px;
border-radius:20px;
color:white;
cursor:pointer;
}

.btn-premium{
background:#e91e63;
border:none;
padding:8px 14px;
border-radius:20px;
color:white;
cursor:pointer;
}

/* SEARCH */

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

/* ACTIONS */

.actions{
display:flex;
justify-content:center;
padding:10px;
}

.btn-creer-premium{
background:#e91e63;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* CATEGORIES */

.categories{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.categories button{
background:#2196f3;
border:none;
color:white;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

/* OFFRES */

.section{
padding:15px;
}

.categorie-scroll{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.offre{
flex:0 0 230px;
background:white;
color:black;
padding:12px;
border-radius:10px;
}

.offre h4{
font-weight:bold;
font-size:16px;
}

.offre button{
background:#25d366;
border:none;
padding:8px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* PROFILS */

.ville-scroll{
display:flex;
flex-wrap:nowrap;
overflow-x:auto;
overflow-y:hidden;
gap:12px;
padding:10px;
}

.profil{
flex:0 0 180px;
min-width:180px;
background:white;
color:black;
padding:10px;
border-radius:10px;
text-align:center;
position:relative;
}

.profil img{
width:70px;
height:70px;
border-radius:50%;
margin-bottom:5px;
}

.profil button{
background:#25d366;
border:none;
padding:6px;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:4px;
}

/* BADGES */

.badge{
position:absolute;
top:5px;
right:5px;
font-size:11px;
padding:3px 8px;
border-radius:10px;
color:white;
}

.attente{background:#f1c40f;color:black;}
.verifie{background:#2ecc71;}
.premium{background:#9b59b6;}

/* WhatsApp */

.whatsapp-float{
position:fixed;
bottom:80px;
right:20px;
background:#25d366;
color:white;
font-size:28px;
padding:15px;
border-radius:50%;
}

/* Ticker */

.ticker{
position:fixed;
bottom:0;
width:100%;
background:black;
color:white;
padding:8px;
font-size:14px;
}

</style>
</head>

<body>

<header class="header">

<div class="header-left">
<img class="logo"
src="https://raw.githubusercontent.com/Lfg237/m-dias/main/Polish_20260304_122805013.png">
<span class="site-title">workshopkmer</span>
</div>

<div class="header-center">
<a href="https://business-tv.vercel.app/" target="_blank"><i class="fa-solid fa-globe"></i></a>
<a href="https://www.facebook.com/profile.php?id=61587742360056" target="_blank"><i class="fa-brands fa-facebook"></i></a>
<a href="https://whatsapp.com/channel/0029Vb8CxB25Ui2VYo0Ylt2w" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
</div>

<div class="header-right">

<button class="btn-offre" onclick="ouvrirFormOffre()">➕ Publier</button>

<button onclick="voirPremium()" class="btn-premium">
⭐ chercheurs d'emploi
</button>

<button onclick="demanderAdmin()" style="background:black;color:white;border:none;padding:8px 12px;border-radius:10px;">
🔐 Admin
</button>

</div>

</header>

<div class="search">
<input type="text" id="search" placeholder="Rechercher..." onkeyup="rechercher()">
</div>

<div class="actions">
<button class="btn-creer-premium" onclick="ouvrirFormPremium()">👤 Créer profil Premium</button>
</div>

<div class="categories" id="categories"></div>

<div class="section">
<h3>💼 Offres d'emploi</h3>
<div id="offres"></div>
</div>

<div class="section">
<h3>⭐ Profils Premium</h3>
<div id="premium"></div>
</div>

<a class="whatsapp-float"
href="https://wa.me/237670035609"
target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<div class="ticker">
<marquee>📢 Publiez vos offres • ⭐ Devenez premium • 📲 Rejoignez WhatsApp</marquee>
</div>

<script>

/* ADMIN */
let isAdmin=false

function demanderAdmin(){
let code=prompt("Code admin :")
if(code=="2332"){
isAdmin=true
alert("Admin activé")
location.reload()
}
}

/* OFFRES */
fetch("https://sheetdb.io/api/v1/xfp4ufhy8zirg")
.then(r=>r.json())
.then(data=>afficherOffres(data))

function afficherOffres(data){
let c=document.getElementById("offres")
c.innerHTML=""
let cats={}
data.forEach(o=>{
let cat=o["catégories "]||"Autres"
if(!cats[cat]) cats[cat]=[]
cats[cat].push(o)
})

for(let cat in cats){
c.innerHTML+=`<h3>${cat}</h3><div class="categorie-scroll" id="${cat}"></div>`
let zone=document.getElementById(cat)
cats[cat].forEach(o=>{
zone.innerHTML+=`
<div class="offre">
<h4><b>${o["recruteurs "]}</b></h4>
<p><b>${o["type d'employer recherché "]}</b></p>
<p>${o["ville quartier où localisation "]}</p>
<button onclick="contactOffre('${o["contact WhatsApp "]}')">WhatsApp</button>
</div>`
})
}
}

function contactOffre(n){
window.open("https://wa.me/237"+n)
}

/* PROFILS */

fetch("https://sheetdb.io/api/v1/14gkkcq7cvn8v")
.then(r=>r.json())
.then(data=>afficherPremium(data))

function afficherPremium(data){

let c=document.getElementById("premium")
c.innerHTML=""
let villes={}

data.forEach(p=>{
let loc=p["ville et quartier :"]||"Autres"
let parts=loc.split("-")
let v=parts[0].trim()
let q=parts[1]?parts[1].trim():"Centre"

if(!villes[v]) villes[v]={}
if(!villes[v][q]) villes[v][q]=[]
villes[v][q].push(p)
})

for(let v in villes){
c.innerHTML+=`<h2>${v}</h2>`

for(let q in villes[v]){

let id=(v+q).replace(/\s/g,'')

c.innerHTML+=`
<h4>📍 ${q}</h4>
<div class="ville-scroll" id="${id}"></div>
`

let zone=document.getElementById(id)

villes[v][q].forEach(p=>{

let idU=p["id_unique"]||""

let infos=""
for(let k in p){
if(k.includes("nom")||k.includes("WhatsApp")||k.includes("statut")||k.includes("id_unique")) continue
infos+=`<p>${p[k]}</p>`
}

let adminBtns=""
if(isAdmin){
adminBtns=`
<button onclick="supprimer('${idU}')" style="background:red;">❌</button>
<button onclick="modifier('${idU}')" style="background:orange;">✏️</button>`
}

zone.innerHTML+=`
<div class="profil">
<h4>${p["nom et prénom :"]}</h4>
${infos}
<button onclick="contactProfil('${p["WhatsApp :"]}')">WhatsApp</button>
${adminBtns}
</div>`
})

}
}
}

function contactProfil(n){
window.open("https://wa.me/237"+n)
}

/* ADMIN ACTIONS */

function supprimer(id){
if(confirm("Supprimer ?")){
fetch("https://sheetdb.io/api/v1/14gkkcq7cvn8v/id_unique/"+id,{method:"DELETE"})
.then(()=>location.reload())
}
}

function modifier(id){
let nom=prompt("Nom")
fetch("https://sheetdb.io/api/v1/14gkkcq7cvn8v/id_unique/"+id,{
method:"PATCH",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({data:{"nom et prénom :":nom}})
}).then(()=>location.reload())
}

</script>

</body>
</html>
