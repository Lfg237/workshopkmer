<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Offres d'emploi Cameroun</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0a66c2;
color:white;
padding:15px;
text-align:center;
}

.section{
padding:15px;
}

.search{
padding:10px;
width:95%;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
}

.offre{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

#premium{
display:flex;
overflow-x:auto;
gap:10px;
}

.profil{
min-width:150px;
background:white;
padding:10px;
border-radius:8px;
}

button{
background:#0a66c2;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
}

</style>
</head>

<body>

<header>
<h2>Offres d'emploi Cameroun</h2>
</header>

<div class="section">

<input type="text" id="search" class="search"
placeholder="Rechercher ville, quartier, profession, âge..."
onkeyup="rechercher()">

</div>

<div class="section">

<h3>Offres d'emploi</h3>

<div id="offres"></div>

</div>

<div class="section">

<h3>Profils Premium</h3>

<div id="premium"></div>

</div>

<script>

let offresData=[];
let premiumData=[];

fetch("https://sheetdb.io/api/v1/xfp4ufhy8zirg")
.then(res => res.json())
.then(data => {
offresData=data;
afficherOffres(data);
});

function afficherOffres(data){

let container=document.getElementById("offres");
container.innerHTML="";

data.forEach(o => {

container.innerHTML += `
<div class="offre">

<h3>${o["nom entreprise ou employeur "]}</h3>

<p>Catégorie : ${o["catégories "]}</p>

<p>Poste : ${o["type d'employer recherché "]}</p>

<p>Lieu : ${o["ville quartier où localisation "]}</p>

<p>${o["description "]}</p>

<a href="https://wa.me/${o["contact WhatsApp "]}">
<button>Contacter WhatsApp</button>
</a>

</div>
`;

});

}

fetch("https://sheetdb.io/api/v1/14gkkcq7cvn8v")
.then(res => res.json())
.then(data => {
premiumData=data;
afficherPremium(data);
});

function afficherPremium(data){

let container=document.getElementById("premium");
container.innerHTML="";

data.forEach(p => {

container.innerHTML += `
<div class="profil">

<h4>${p["nom et prénom :"]}</h4>

<p>${p["ville et quartier :"]}</p>

</div>
`;

});

}

function rechercher(){

let mot=document.getElementById("search").value.toLowerCase();

let offresFiltrees=offresData.filter(o =>
JSON.stringify(o).toLowerCase().includes(mot)
);

let premiumFiltres=premiumData.filter(p =>
JSON.stringify(p).toLowerCase().includes(mot)
);

afficherOffres(offresFiltrees);
afficherPremium(premiumFiltres);

}

</script>

</body>
</html>
